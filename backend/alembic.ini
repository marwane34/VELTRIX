# ============================================================
# ALEMBIC CONFIGURATION - PREDICTIVE MAINTENANCE BACKEND
# ============================================================
# The sqlalchemy.url here is a placeholder; it is overridden at
# runtime by alembic/env.py which reads settings.sync_database_url.
# ============================================================

[alembic]
# Path to the migration environment
script_location = alembic

# Template used to generate migration file templates
# file_template = %%(rev)s_%%(slug)s
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision messages to this many characters
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 40

# Set to true to use the --sql directive offline and generate SQL scripts.
# set to false to run the migrations directly against the database.
# sqlalchemy.url is overridden in env.py via app.config.settings
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/predictive_maintenance

# Timezone for the filename timestamp. If not specified, uses UTC.
# timezone =

# Max length of characters to apply to the "slug" field in the filename.
# truncate_slug_length = 40

# Output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# The revision ID of the base revision in the migrations directory.
# Only needed when the "base" revision is not in the migrations directory.
# base_revision =


[post_write_hooks]
# Hooks executed after a migration is generated. Uncomment to enable.
# lint = ruff check
# format = ruff format


# ============================================================
# LOGGING
# ============================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
