[network]
api_host = 0.0.0.0
api_port = 8765
esp32_ip = 192.168.1.100
esp32_port = 80
mqtt_broker = broker.hivemq.com
mqtt_port = 1883
mqtt_topic = factory/machines/+/sensors

[serial]
port = COM3
baud_rate = 115200
timeout = 2

[monitoring]
update_interval_ms = 200
snapshot_interval_s = 5
simulation_mode = true
data_source = simulation

[thresholds]
rms_min = 0.5
rms_max = 3.0
temp_min = 20.0
temp_max = 85.0
current_min = 0.5
current_max = 5.0
rpm_min = 1200
rpm_max = 1800

[database]
path = data/predictive_maintenance.db

[export]
output_dir = exports

[ui]
theme = dark
fullscreen = false
